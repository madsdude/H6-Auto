---
- name: Collect Cisco facts for NetBox sync
  hosts: cisco_ios
  gather_facts: false

  tasks:
    - name: Collect Cisco IOS facts
      cisco.ios.ios_facts:
        gather_subset:
          - min
          - hardware
          - interfaces
      register: ios_facts_result

    - name: Collect show version first line
      cisco.ios.ios_command:
        commands:
          - show version
      register: show_version_result

    - name: Build NetBox discovery facts per device
      ansible.builtin.set_fact:
        nb_site: "{{ inventory_hostname | regex_replace('^([^-]+).*', '\\1') }}"
        nb_role: >-
          {% if '-SW' in inventory_hostname %}Core Switch
          {% elif '-CORE-R' in inventory_hostname %}Core Router
          {% elif inventory_hostname is regex('.*-R[0-9]+$') %}CE Router
          {% else %}Network Device
          {% endif %}
        nb_platform: >-
          {% if 'IOS XE' in (show_version_result.stdout[0] | default('')) %}Cisco IOS XE
          {% else %}Cisco IOS
          {% endif %}
        nb_model: "{{ ansible_net_model | default('Cisco Unknown') }}"
        nb_model_slug: "{{ ('cisco-' ~ (ansible_net_model | default('unknown'))) | lower | regex_replace('[^a-z0-9]+', '-') | regex_replace('(^-|-$)', '') }}"
        nb_serial: "{{ ansible_net_serialnum | default('') }}"
        nb_version: "{{ ansible_net_version | default('unknown') }}"
        nb_mgmt_ip: "{{ ansible_host }}"
        nb_show_version_first_line: "{{ show_version_result.stdout_lines[0][0] | default('unknown') }}"

    - name: Show collected device facts
      ansible.builtin.debug:
        msg:
          device: "{{ inventory_hostname }}"
          site: "{{ nb_site }}"
          role: "{{ nb_role | trim }}"
          platform: "{{ nb_platform | trim }}"
          model: "{{ nb_model }}"
          serial: "{{ nb_serial }}"
          version: "{{ nb_version }}"
          management_ip: "{{ nb_mgmt_ip }}"
          interfaces_found: "{{ ansible_net_interfaces | default({}) | length }}"

- name: Sync collected Cisco data into NetBox
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    netbox_url: "{{ NETBOX_URL | default(lookup('ansible.builtin.env', 'NETBOX_URL') | default('', true), true) }}"
    netbox_token: "{{ NETBOX_TOKEN | default(lookup('ansible.builtin.env', 'NETBOX_TOKEN') | default('', true), true) }}"
    netbox_validate_certs: "{{ (NETBOX_VALIDATE_CERTS | default(lookup('ansible.builtin.env', 'NETBOX_VALIDATE_CERTS') | default('false', true), true)) | bool }}"
    netbox_api_url: "{{ netbox_url | regex_replace('/+$', '') }}"
    netbox_dry_run: "{{ (NETBOX_DRY_RUN | default(false, true)) | bool }}"
    netbox_no_log: "{{ not ((NETBOX_DEBUG | default(false, true)) | bool) }}"

  pre_tasks:
    - name: Validate NetBox API variables
      ansible.builtin.assert:
        that:
          - netbox_api_url is defined
          - netbox_api_url | length > 0
          - netbox_token is defined
          - netbox_token | length > 0
        fail_msg: "NETBOX_URL and NETBOX_TOKEN must be configured in Semaphore."

    - name: Build normalized device list from collected hostvars
      ansible.builtin.set_fact:
        h6_netbox_devices: "{{ h6_netbox_devices | default([]) + [ device_payload ] }}"
      vars:
        device_payload:
          name: "{{ item }}"
          site: "{{ hostvars[item].nb_site }}"
          role: "{{ hostvars[item].nb_role | trim }}"
          platform: "{{ hostvars[item].nb_platform | trim }}"
          model: "{{ hostvars[item].nb_model }}"
          model_slug: "{{ hostvars[item].nb_model_slug }}"
          serial: "{{ hostvars[item].nb_serial }}"
          version: "{{ hostvars[item].nb_version }}"
          management_ip: "{{ hostvars[item].nb_mgmt_ip }}"
          show_version_first_line: "{{ hostvars[item].nb_show_version_first_line }}"
      loop: "{{ groups['cisco_ios'] }}"

    - name: Build unique discovered device type list
      ansible.builtin.set_fact:
        h6_netbox_device_types: "{{ h6_netbox_device_types | default([]) + [ {'model': item.model, 'model_slug': item.model_slug} ] }}"
      loop: "{{ h6_netbox_devices | unique(attribute='model') | list }}"

    - name: Build site list
      ansible.builtin.set_fact:
        h6_netbox_sites: "{{ h6_netbox_devices | map(attribute='site') | unique | list }}"

    - name: Build interface list from Cisco facts
      ansible.builtin.set_fact:
        h6_netbox_interfaces: "{{ h6_netbox_interfaces | default([]) + iface_payloads }}"
      vars:
        iface_payloads: >-
          {%- set out = [] -%}
          {%- for iface_name, iface_data in (hostvars[item].ansible_net_interfaces | default({})).items() -%}
          {%-   set _ = out.append({
                  'device': item,
                  'name': iface_name,
                  'description': iface_data.description | default(''),
                  'enabled': (iface_data.operstatus | default('') != 'administratively down')
                }) -%}
          {%- endfor -%}
          {{ out }}
      loop: "{{ groups['cisco_ios'] }}"

    - name: Show sync plan
      ansible.builtin.debug:
        msg:
          netbox_url: "{{ netbox_api_url }}"
          dry_run: "{{ netbox_dry_run }}"
          sites: "{{ h6_netbox_sites }}"
          devices: "{{ h6_netbox_devices | map(attribute='name') | list }}"
          device_types: "{{ h6_netbox_device_types | map(attribute='model') | list }}"
          physical_logical_interfaces: "{{ h6_netbox_interfaces | length }}"
          management_ips: "{{ h6_netbox_devices | map(attribute='management_ip') | list }}"

  tasks:
    - name: Ensure manufacturer Cisco exists
      netbox.netbox.netbox_manufacturer:
        netbox_url: "{{ netbox_api_url }}"
        netbox_token: "{{ netbox_token }}"
        validate_certs: "{{ netbox_validate_certs }}"
        data:
          name: Cisco
          slug: cisco
        state: present
      check_mode: "{{ netbox_dry_run }}"
      no_log: "{{ netbox_no_log }}"

    - name: Ensure required sites exist
      netbox.netbox.netbox_site:
        netbox_url: "{{ netbox_api_url }}"
        netbox_token: "{{ netbox_token }}"
        validate_certs: "{{ netbox_validate_certs }}"
        data:
          name: "{{ item }}"
          slug: "{{ item | lower }}"
          status: active
          time_zone: Europe/Copenhagen
          description: "H6 lab site discovered by Ansible/Semaphore"
        state: present
      loop: "{{ h6_netbox_sites }}"
      check_mode: "{{ netbox_dry_run }}"
      no_log: "{{ netbox_no_log }}"

    - name: Ensure device roles exist
      netbox.netbox.netbox_device_role:
        netbox_url: "{{ netbox_api_url }}"
        netbox_token: "{{ netbox_token }}"
        validate_certs: "{{ netbox_validate_certs }}"
        data:
          name: "{{ item.name }}"
          slug: "{{ item.slug }}"
          color: "{{ item.color }}"
        state: present
      loop:
        - { name: "Core Router", slug: "core-router", color: "f44336" }
        - { name: "CE Router", slug: "ce-router", color: "ff9800" }
        - { name: "Core Switch", slug: "core-switch", color: "2196f3" }
        - { name: "Network Device", slug: "network-device", color: "9e9e9e" }
      check_mode: "{{ netbox_dry_run }}"
      no_log: "{{ netbox_no_log }}"

    - name: Ensure Cisco platforms exist
      netbox.netbox.netbox_platform:
        netbox_url: "{{ netbox_api_url }}"
        netbox_token: "{{ netbox_token }}"
        validate_certs: "{{ netbox_validate_certs }}"
        data:
          name: "{{ item.name }}"
          slug: "{{ item.slug }}"
          manufacturer: Cisco
        state: present
      loop:
        - { name: "Cisco IOS", slug: "cisco-ios" }
        - { name: "Cisco IOS XE", slug: "cisco-ios-xe" }
      check_mode: "{{ netbox_dry_run }}"
      no_log: false

    - name: Ensure discovered device types exist
      netbox.netbox.netbox_device_type:
        netbox_url: "{{ netbox_api_url }}"
        netbox_token: "{{ netbox_token }}"
        validate_certs: "{{ netbox_validate_certs }}"
        data:
          manufacturer: Cisco
          model: "{{ item.model }}"
          slug: "{{ item.model_slug }}"
        state: present
      loop: "{{ h6_netbox_device_types }}"
      loop_control:
        label: "{{ item.model }}"
      check_mode: "{{ netbox_dry_run }}"
      no_log: "{{ netbox_no_log }}"

    - name: Ensure discovered devices exist
      netbox.netbox.netbox_device:
        netbox_url: "{{ netbox_api_url }}"
        netbox_token: "{{ netbox_token }}"
        validate_certs: "{{ netbox_validate_certs }}"
        data:
          name: "{{ item.name }}"
          site: "{{ item.site }}"
          device_type: "{{ item.model }}"
          device_role: "{{ item.role }}"
          platform: "{{ item.platform }}"
          serial: "{{ item.serial }}"
          status: active
          comments: |-
            Managed by Ansible/Semaphore H6 automation.
            Ansible host: {{ item.management_ip }}
            Model: {{ item.model }}
            Serial: {{ item.serial }}
            Software version: {{ item.version }}
            Show version: {{ item.show_version_first_line }}
        state: present
      loop: "{{ h6_netbox_devices }}"
      loop_control:
        label: "{{ item.name }}"
      check_mode: "{{ netbox_dry_run }}"
      no_log: false

    - name: Ensure discovered interfaces exist in NetBox
      netbox.netbox.netbox_device_interface:
        netbox_url: "{{ netbox_api_url }}"
        netbox_token: "{{ netbox_token }}"
        validate_certs: "{{ netbox_validate_certs }}"
        data:
          device: "{{ item.device }}"
          name: "{{ item.name }}"
          enabled: "{{ item.enabled }}"
          description: "{{ item.description }}"
        state: present
      loop: "{{ h6_netbox_interfaces }}"
      loop_control:
        label: "{{ item.device }} {{ item.name }}"
      check_mode: "{{ netbox_dry_run }}"
      no_log: "{{ netbox_no_log }}"

    - name: Ensure management interface exists
      netbox.netbox.netbox_device_interface:
        netbox_url: "{{ netbox_api_url }}"
        netbox_token: "{{ netbox_token }}"
        validate_certs: "{{ netbox_validate_certs }}"
        data:
          device: "{{ item.name }}"
          name: mgmt-ansible
          enabled: true
          mgmt_only: true
          description: "Automation reachability IP from Semaphore inventory"
        state: present
      loop: "{{ h6_netbox_devices }}"
      loop_control:
        label: "{{ item.name }} mgmt-ansible"
      check_mode: "{{ netbox_dry_run }}"
      no_log: "{{ netbox_no_log }}"

    - name: Ensure management IP addresses exist and are assigned
      netbox.netbox.netbox_ip_address:
        netbox_url: "{{ netbox_api_url }}"
        netbox_token: "{{ netbox_token }}"
        validate_certs: "{{ netbox_validate_certs }}"
        data:
          address: "{{ item.management_ip }}/32"
          status: active
          description: "Ansible/Semaphore management address for {{ item.name }}"
          assigned_object:
            device: "{{ item.name }}"
            name: mgmt-ansible
        state: present
      loop: "{{ h6_netbox_devices }}"
      loop_control:
        label: "{{ item.name }} {{ item.management_ip }}/32"
      check_mode: "{{ netbox_dry_run }}"
      no_log: "{{ netbox_no_log }}"

    - name: Set primary IPv4 on devices
      netbox.netbox.netbox_device:
        netbox_url: "{{ netbox_api_url }}"
        netbox_token: "{{ netbox_token }}"
        validate_certs: "{{ netbox_validate_certs }}"
        data:
          name: "{{ item.name }}"
          primary_ip4: "{{ item.management_ip }}/32"
        state: present
      loop: "{{ h6_netbox_devices }}"
      loop_control:
        label: "{{ item.name }} primary_ip4={{ item.management_ip }}/32"
      check_mode: "{{ netbox_dry_run }}"
      no_log: "{{ netbox_no_log }}"

    - name: NetBox sync complete
      ansible.builtin.debug:
        msg: "NetBox sync complete. Devices={{ h6_netbox_devices | length }}, interfaces={{ h6_netbox_interfaces | length }}, mgmt_ips={{ h6_netbox_devices | length }}, dry_run={{ netbox_dry_run }}"
