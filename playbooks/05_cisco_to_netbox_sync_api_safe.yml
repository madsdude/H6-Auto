---
- name: Collect Cisco facts for NetBox API-safe sync
  hosts: cisco_ios
  gather_facts: false

  vars:
    netbox_store_full_config: "{{ (NETBOX_STORE_FULL_CONFIG | default(lookup('ansible.builtin.env', 'NETBOX_STORE_FULL_CONFIG') | default('false', true), true)) | bool }}"

  tasks:
    - name: Collect Cisco IOS facts
      cisco.ios.ios_facts:
        gather_subset:
          - min
          - hardware
          - interfaces
        gather_network_resources:
          - l3_interfaces

    - name: Collect show version first line
      cisco.ios.ios_command:
        commands:
          - show version
      register: show_version_result

    - name: Collect running config
      cisco.ios.ios_command:
        commands:
          - show running-config
      register: running_config_result
      no_log: true

    - name: Build NetBox discovery facts per device
      ansible.builtin.set_fact:
        nb_site: "{{ inventory_hostname | regex_replace('^([^-]+).*', '\\1') }}"
        nb_role: >-
          {% if '-SW' in inventory_hostname %}Core Switch
          {% elif '-CORE-R' in inventory_hostname %}Core Router
          {% elif inventory_hostname is regex('.*-R[0-9]+$') %}CE Router
          {% else %}Network Device
          {% endif %}
        nb_platform: >-
          {% if 'IOS XE' in (show_version_result.stdout[0] | default('')) %}Cisco IOS XE
          {% else %}Cisco IOS
          {% endif %}
        nb_model: "{{ ansible_net_model | default('Cisco Unknown') }}"
        nb_model_slug: "{{ (ansible_net_model | default('unknown')) | lower | regex_replace('/', '') | regex_replace('[^a-z0-9-]+', '-') | regex_replace('(^-|-$)', '') }}"
        nb_serial: "{{ ansible_net_serialnum | default('') }}"
        nb_version: "{{ ansible_net_version | default('unknown') }}"
        nb_mgmt_ip: "{{ ansible_host }}"
        nb_show_version_first_line: "{{ show_version_result.stdout_lines[0][0] | default('unknown') }}"
        nb_running_config_raw: "{{ running_config_result.stdout[0] | default('') }}"
        nb_running_config: "{{ (running_config_result.stdout[0] | default('')) if (netbox_store_full_config | bool) else ((running_config_result.stdout[0] | default('')) | regex_replace('(?im)^.*(password|secret|snmp-server community|pre-shared-key|tacacs-server key|radius-server key|key-string|shared-secret).*$','! REDACTED - sensitive config line')) }}"

    - name: Show collected device facts
      ansible.builtin.debug:
        msg:
          device: "{{ inventory_hostname }}"
          site: "{{ nb_site }}"
          role: "{{ nb_role | trim }}"
          platform: "{{ nb_platform | trim }}"
          model: "{{ nb_model }}"
          model_slug: "{{ nb_model_slug }}"
          serial: "{{ nb_serial }}"
          version: "{{ nb_version }}"
          management_ip: "{{ nb_mgmt_ip }}"
          interfaces_found: "{{ ansible_net_interfaces | default({}) | length }}"
          l3_interfaces_found: "{{ ansible_network_resources.l3_interfaces | default([]) | length }}"
          running_config_chars: "{{ nb_running_config | length }}"
          store_full_running_config: "{{ netbox_store_full_config }}"

- name: Sync collected Cisco facts into NetBox with API-safe device type handling
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    netbox_url: "{{ NETBOX_URL | default(lookup('ansible.builtin.env', 'NETBOX_URL') | default('', true), true) }}"
    netbox_token: "{{ NETBOX_TOKEN | default(lookup('ansible.builtin.env', 'NETBOX_TOKEN') | default('', true), true) }}"
    netbox_validate_certs: "{{ (NETBOX_VALIDATE_CERTS | default(lookup('ansible.builtin.env', 'NETBOX_VALIDATE_CERTS') | default('false', true), true)) | bool }}"
    netbox_api_url: "{{ netbox_url | regex_replace('/+$', '') }}"
    netbox_no_log: "{{ not ((NETBOX_DEBUG | default(false, true)) | bool) }}"
    netbox_store_full_config: "{{ (NETBOX_STORE_FULL_CONFIG | default(lookup('ansible.builtin.env', 'NETBOX_STORE_FULL_CONFIG') | default('false', true), true)) | bool }}"

  pre_tasks:
    - name: Validate NetBox API variables
      ansible.builtin.assert:
        that:
          - netbox_api_url is defined
          - netbox_api_url | length > 0
          - netbox_token is defined
          - netbox_token | length > 0
        fail_msg: "NETBOX_URL and NETBOX_TOKEN must be configured in Semaphore."

    - name: Set sync timestamp
      ansible.builtin.set_fact:
        netbox_sync_timestamp: "{{ lookup('ansible.builtin.pipe', 'date -Iseconds') }}"

    - name: Build normalized device list from Cisco hostvars
      ansible.builtin.set_fact:
        h6_netbox_devices: "{{ h6_netbox_devices | default([]) + [ device_payload ] }}"
      vars:
        device_payload:
          name: "{{ item }}"
          site: "{{ hostvars[item].nb_site }}"
          role: "{{ hostvars[item].nb_role | trim }}"
          platform: "{{ hostvars[item].nb_platform | trim }}"
          model: "{{ hostvars[item].nb_model }}"
          model_slug: "{{ hostvars[item].nb_model_slug }}"
          serial: "{{ hostvars[item].nb_serial }}"
          version: "{{ hostvars[item].nb_version }}"
          management_ip: "{{ hostvars[item].nb_mgmt_ip }}"
          show_version_first_line: "{{ hostvars[item].nb_show_version_first_line }}"
          running_config: "{{ hostvars[item].nb_running_config | default('') }}"
      loop: "{{ groups['cisco_ios'] }}"

    - name: Build unique device type list
      ansible.builtin.set_fact:
        h6_netbox_device_types: "{{ h6_netbox_device_types | default([]) + [ {'model': item.model, 'model_slug': item.model_slug} ] }}"
      loop: "{{ h6_netbox_devices | unique(attribute='model') | list }}"

    - name: Build site list
      ansible.builtin.set_fact:
        h6_netbox_sites: "{{ h6_netbox_devices | map(attribute='site') | unique | list }}"

    - name: Build interface list from Cisco facts
      ansible.builtin.set_fact:
        h6_netbox_interfaces: "{{ h6_netbox_interfaces | default([]) + iface_payloads }}"
      vars:
        iface_payloads: >-
          {%- set out = [] -%}
          {%- for iface_name, iface_data in (hostvars[item].ansible_net_interfaces | default({})).items() -%}
          {%-   set _ = out.append({
                  'device': item,
                  'name': iface_name,
                  'description': iface_data.description | default(''),
                  'enabled': (iface_data.operstatus | default('') != 'administratively down'),
                  'type': 'other'
                }) -%}
          {%- endfor -%}
          {{ out }}
      loop: "{{ groups['cisco_ios'] }}"

    - name: Build interface IP list from Cisco L3 facts
      ansible.builtin.set_fact:
        h6_netbox_interface_ips: "{{ h6_netbox_interface_ips | default([]) + ip_payloads }}"
      vars:
        ip_payloads: >-
          {%- set out = [] -%}
          {%- for l3 in (hostvars[item].ansible_network_resources.l3_interfaces | default([])) -%}
          {%-   for ip in (l3.ipv4 | default([])) -%}
          {%-     if ip.address is defined and ip.address != 'dhcp' and '/' in ip.address -%}
          {%-       set _ = out.append({
                    'device': item,
                    'interface': l3.name,
                    'address': ip.address,
                    'host_ip': ip.address.split('/')[0],
                    'description': 'Discovered from Cisco interface ' ~ item ~ ' ' ~ l3.name
                  }) -%}
          {%-     endif -%}
          {%-   endfor -%}
          {%- endfor -%}
          {{ out }}
      loop: "{{ groups['cisco_ios'] }}"

    - name: Build primary IPv4 list
      ansible.builtin.set_fact:
        h6_netbox_primary_ips: "{{ h6_netbox_primary_ips | default([]) + [ primary_payload ] }}"
      vars:
        matching_discovered_ips: "{{ h6_netbox_interface_ips | default([]) | selectattr('device', 'equalto', item.name) | selectattr('host_ip', 'equalto', item.management_ip) | list }}"
        primary_payload:
          name: "{{ item.name }}"
          management_ip: "{{ item.management_ip }}"
          primary_ip: "{{ matching_discovered_ips[0].address if (matching_discovered_ips | length > 0) else item.management_ip ~ '/32' }}"
          has_discovered_mgmt_ip: "{{ matching_discovered_ips | length > 0 }}"
      loop: "{{ h6_netbox_devices }}"

    - name: Show sync plan
      ansible.builtin.debug:
        msg:
          netbox_url: "{{ netbox_api_url }}"
          sites: "{{ h6_netbox_sites }}"
          devices: "{{ h6_netbox_devices | map(attribute='name') | list }}"
          device_types: "{{ h6_netbox_device_types }}"
          interfaces: "{{ h6_netbox_interfaces | length }}"
          discovered_interface_ips: "{{ h6_netbox_interface_ips | length }}"
          primary_ips: "{{ h6_netbox_primary_ips }}"
          running_configs: "{{ h6_netbox_devices | map(attribute='name') | list | length }} devices"
          store_full_running_config: "{{ netbox_store_full_config }}"

  tasks:
    - name: Ensure manufacturer Cisco exists
      netbox.netbox.netbox_manufacturer:
        netbox_url: "{{ netbox_api_url }}"
        netbox_token: "{{ netbox_token }}"
        validate_certs: "{{ netbox_validate_certs }}"
        data:
          name: Cisco
          slug: cisco
        state: present
      no_log: "{{ netbox_no_log }}"

    - name: Ensure sites exist
      netbox.netbox.netbox_site:
        netbox_url: "{{ netbox_api_url }}"
        netbox_token: "{{ netbox_token }}"
        validate_certs: "{{ netbox_validate_certs }}"
        data:
          name: "{{ item }}"
          slug: "{{ item | lower }}"
          status: active
          time_zone: Europe/Copenhagen
          description: "H6 lab site discovered by Ansible/Semaphore"
        state: present
      loop: "{{ h6_netbox_sites }}"
      no_log: "{{ netbox_no_log }}"

    - name: Ensure device roles exist
      netbox.netbox.netbox_device_role:
        netbox_url: "{{ netbox_api_url }}"
        netbox_token: "{{ netbox_token }}"
        validate_certs: "{{ netbox_validate_certs }}"
        data:
          name: "{{ item.name }}"
          slug: "{{ item.slug }}"
          color: "{{ item.color }}"
        state: present
      loop:
        - { name: "Core Router", slug: "core-router", color: "f44336" }
        - { name: "CE Router", slug: "ce-router", color: "ff9800" }
        - { name: "Core Switch", slug: "core-switch", color: "2196f3" }
        - { name: "Network Device", slug: "network-device", color: "9e9e9e" }
      no_log: "{{ netbox_no_log }}"

    - name: Ensure Cisco platforms exist
      netbox.netbox.netbox_platform:
        netbox_url: "{{ netbox_api_url }}"
        netbox_token: "{{ netbox_token }}"
        validate_certs: "{{ netbox_validate_certs }}"
        data:
          name: "{{ item.name }}"
          slug: "{{ item.slug }}"
          manufacturer: Cisco
        state: present
      loop:
        - { name: "Cisco IOS", slug: "cisco-ios" }
        - { name: "Cisco IOS XE", slug: "cisco-ios-xe" }
      no_log: "{{ netbox_no_log }}"

    - name: Lookup Cisco manufacturer ID
      ansible.builtin.uri:
        url: "{{ netbox_api_url }}/api/dcim/manufacturers/?slug=cisco"
        method: GET
        headers:
          Authorization: "Token {{ netbox_token }}"
          Accept: "application/json"
        validate_certs: "{{ netbox_validate_certs }}"
        return_content: true
        status_code: 200
      register: cisco_manufacturer_lookup
      no_log: "{{ netbox_no_log }}"

    - name: Store Cisco manufacturer ID
      ansible.builtin.set_fact:
        cisco_manufacturer_id: "{{ cisco_manufacturer_lookup.json.results[0].id }}"

    - name: Lookup existing device types by manufacturer and model
      ansible.builtin.uri:
        url: "{{ netbox_api_url }}/api/dcim/device-types/?manufacturer_id={{ cisco_manufacturer_id }}&model={{ item.model | urlencode }}"
        method: GET
        headers:
          Authorization: "Token {{ netbox_token }}"
          Accept: "application/json"
        validate_certs: "{{ netbox_validate_certs }}"
        return_content: true
        status_code: 200
      loop: "{{ h6_netbox_device_types }}"
      loop_control:
        label: "{{ item.model }}"
      register: device_type_lookup
      no_log: "{{ netbox_no_log }}"

    - name: Patch existing device type slugs to module-compatible values
      ansible.builtin.uri:
        url: "{{ netbox_api_url }}/api/dcim/device-types/{{ item.json.results[0].id }}/"
        method: PATCH
        headers:
          Authorization: "Token {{ netbox_token }}"
          Accept: "application/json"
          Content-Type: "application/json"
        validate_certs: "{{ netbox_validate_certs }}"
        body_format: json
        body:
          slug: "{{ item.item.model_slug }}"
        return_content: true
        status_code: 200
      loop: "{{ device_type_lookup.results }}"
      loop_control:
        label: "{{ item.item.model }} -> {{ item.item.model_slug }}"
      when:
        - item.json.count | int > 0
        - item.json.results[0].slug != item.item.model_slug
      no_log: "{{ netbox_no_log }}"

    - name: Create missing device types through NetBox API
      ansible.builtin.uri:
        url: "{{ netbox_api_url }}/api/dcim/device-types/"
        method: POST
        headers:
          Authorization: "Token {{ netbox_token }}"
          Accept: "application/json"
          Content-Type: "application/json"
        validate_certs: "{{ netbox_validate_certs }}"
        body_format: json
        body:
          manufacturer: "{{ cisco_manufacturer_id | int }}"
          model: "{{ item.item.model }}"
          slug: "{{ item.item.model_slug }}"
        return_content: true
        status_code: 201
      loop: "{{ device_type_lookup.results }}"
      loop_control:
        label: "{{ item.item.model }} / {{ item.item.model_slug }}"
      when: item.json.count | int == 0
      no_log: "{{ netbox_no_log }}"

    - name: Ensure devices exist
      netbox.netbox.netbox_device:
        netbox_url: "{{ netbox_api_url }}"
        netbox_token: "{{ netbox_token }}"
        validate_certs: "{{ netbox_validate_certs }}"
        data:
          name: "{{ item.name }}"
          site: "{{ item.site }}"
          device_type: "{{ item.model_slug }}"
          device_role: "{{ item.role }}"
          platform: "{{ item.platform }}"
          serial: "{{ item.serial }}"
          status: active
          comments: |-
            Managed by Ansible/Semaphore H6 automation.
            Ansible host: {{ item.management_ip }}
            Model: {{ item.model }}
            Serial: {{ item.serial }}
            Software version: {{ item.version }}
            Show version: {{ item.show_version_first_line }}
        state: present
      loop: "{{ h6_netbox_devices }}"
      loop_control:
        label: "{{ item.name }}"
      no_log: false

    - name: Ensure running_config custom field exists on devices
      ansible.builtin.uri:
        url: "{{ netbox_api_url }}/api/extras/custom-fields/"
        method: POST
        headers:
          Authorization: "Token {{ netbox_token }}"
          Accept: "application/json"
          Content-Type: "application/json"
        validate_certs: "{{ netbox_validate_certs }}"
        body_format: json
        body:
          name: running_config
          label: Running Config
          type: longtext
          object_types:
            - dcim.device
          required: false
          description: "Latest Cisco show running-config collected by Ansible/Semaphore. Sensitive lines are redacted unless NETBOX_STORE_FULL_CONFIG=true."
          weight: 1000
        return_content: true
        status_code:
          - 201
          - 400
      register: running_config_cf_create
      failed_when: >-
        running_config_cf_create.status == 400 and
        ('already exists' not in (running_config_cf_create.content | lower)) and
        ('custom field with this name' not in (running_config_cf_create.content | lower))
      no_log: "{{ netbox_no_log }}"

    - name: Lookup NetBox device IDs for running config update
      ansible.builtin.uri:
        url: "{{ netbox_api_url }}/api/dcim/devices/?name={{ item.name | urlencode }}"
        method: GET
        headers:
          Authorization: "Token {{ netbox_token }}"
          Accept: "application/json"
        validate_certs: "{{ netbox_validate_certs }}"
        return_content: true
        status_code: 200
      loop: "{{ h6_netbox_devices }}"
      loop_control:
        label: "{{ item.name }}"
      register: device_lookup_for_config
      no_log: "{{ netbox_no_log }}"

    - name: Store running config in NetBox custom field on device
      ansible.builtin.uri:
        url: "{{ netbox_api_url }}/api/dcim/devices/{{ item.json.results[0].id }}/"
        method: PATCH
        headers:
          Authorization: "Token {{ netbox_token }}"
          Accept: "application/json"
          Content-Type: "application/json"
        validate_certs: "{{ netbox_validate_certs }}"
        body_format: json
        body:
          custom_fields:
            running_config: |-
              ! Synced by Ansible/Semaphore at {{ netbox_sync_timestamp }}
              ! Device: {{ item.item.name }}
              ! Full running config stored: {{ netbox_store_full_config }}
              {% if not netbox_store_full_config %}! Sensitive lines redacted. Set NETBOX_STORE_FULL_CONFIG=true to store raw config.
              {% endif %}
              {{ item.item.running_config }}
        return_content: true
        status_code: 200
      loop: "{{ device_lookup_for_config.results }}"
      loop_control:
        label: "{{ item.item.name }} running_config"
      when: item.json.count | int > 0
      no_log: true

    - name: Ensure discovered interfaces exist in NetBox
      netbox.netbox.netbox_device_interface:
        netbox_url: "{{ netbox_api_url }}"
        netbox_token: "{{ netbox_token }}"
        validate_certs: "{{ netbox_validate_certs }}"
        data:
          device: "{{ item.device }}"
          name: "{{ item.name }}"
          type: "{{ item.type }}"
          enabled: "{{ item.enabled }}"
          description: "{{ item.description }}"
        state: present
      loop: "{{ h6_netbox_interfaces }}"
      loop_control:
        label: "{{ item.device }} {{ item.name }}"
      no_log: false

    - name: Ensure discovered interface IP addresses exist and are assigned
      netbox.netbox.netbox_ip_address:
        netbox_url: "{{ netbox_api_url }}"
        netbox_token: "{{ netbox_token }}"
        validate_certs: "{{ netbox_validate_certs }}"
        data:
          address: "{{ item.address }}"
          status: active
          description: "{{ item.description }}"
          assigned_object:
            device: "{{ item.device }}"
            name: "{{ item.interface }}"
        state: present
      loop: "{{ h6_netbox_interface_ips | default([]) }}"
      loop_control:
        label: "{{ item.device }} {{ item.interface }} {{ item.address }}"
      no_log: false

    - name: Ensure management interface exists
      netbox.netbox.netbox_device_interface:
        netbox_url: "{{ netbox_api_url }}"
        netbox_token: "{{ netbox_token }}"
        validate_certs: "{{ netbox_validate_certs }}"
        data:
          device: "{{ item.name }}"
          name: mgmt-ansible
          type: other
          enabled: true
          mgmt_only: true
          description: "Automation reachability IP from Semaphore inventory. Used only when inventory IP is not discovered on a real interface."
        state: present
      loop: "{{ h6_netbox_devices }}"
      loop_control:
        label: "{{ item.name }} mgmt-ansible"
      no_log: "{{ netbox_no_log }}"

    - name: Ensure fallback management IP addresses exist and are assigned
      netbox.netbox.netbox_ip_address:
        netbox_url: "{{ netbox_api_url }}"
        netbox_token: "{{ netbox_token }}"
        validate_certs: "{{ netbox_validate_certs }}"
        data:
          address: "{{ item.management_ip }}/32"
          status: active
          description: "Ansible/Semaphore fallback management address for {{ item.name }}"
          assigned_object:
            device: "{{ item.name }}"
            name: mgmt-ansible
        state: present
      loop: "{{ h6_netbox_primary_ips }}"
      loop_control:
        label: "{{ item.name }} fallback {{ item.management_ip }}/32"
      when: not (item.has_discovered_mgmt_ip | bool)
      no_log: "{{ netbox_no_log }}"

    - name: Set primary IPv4 on devices
      netbox.netbox.netbox_device:
        netbox_url: "{{ netbox_api_url }}"
        netbox_token: "{{ netbox_token }}"
        validate_certs: "{{ netbox_validate_certs }}"
        data:
          name: "{{ item.name }}"
          primary_ip4: "{{ item.primary_ip }}"
        state: present
      loop: "{{ h6_netbox_primary_ips }}"
      loop_control:
        label: "{{ item.name }} primary_ip4={{ item.primary_ip }}"
      no_log: "{{ netbox_no_log }}"

    - name: NetBox sync complete
      ansible.builtin.debug:
        msg: "NetBox API-safe sync complete. Devices={{ h6_netbox_devices | length }}, interfaces={{ h6_netbox_interfaces | length }}, interface_ips={{ h6_netbox_interface_ips | default([]) | length }}, primary_ips={{ h6_netbox_primary_ips | length }}, running_configs={{ h6_netbox_devices | length }}"
