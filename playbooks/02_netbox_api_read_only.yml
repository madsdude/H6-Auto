---
- name: Read-only NetBox API test
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    netbox_url: "{{ NETBOX_URL | default(lookup('ansible.builtin.env', 'NETBOX_URL') | default('', true), true) }}"
    netbox_token: "{{ NETBOX_TOKEN | default(lookup('ansible.builtin.env', 'NETBOX_TOKEN') | default('', true), true) }}"
    netbox_validate_certs: "{{ (NETBOX_VALIDATE_CERTS | default(lookup('ansible.builtin.env', 'NETBOX_VALIDATE_CERTS') | default('false', true), true)) | bool }}"
    netbox_api_url: "{{ netbox_url | regex_replace('/+$', '') }}"

  pre_tasks:
    - name: Validate NETBOX_URL is set
      ansible.builtin.assert:
        that:
          - netbox_url is defined
          - netbox_url | length > 0
        fail_msg: "NETBOX_URL is missing. Add it as Extra variable or Environment variable in Semaphore."

    - name: Validate NETBOX_TOKEN is set
      ansible.builtin.assert:
        that:
          - netbox_token is defined
          - netbox_token | length > 0
        fail_msg: "NETBOX_TOKEN is missing. Add it as Extra variable or Environment variable in Semaphore."

    - name: Show sanitized NetBox target
      ansible.builtin.debug:
        msg: "Testing NetBox URL: {{ netbox_api_url }} with validate_certs={{ netbox_validate_certs }}"

  tasks:
    - name: Read NetBox status endpoint with token auth
      ansible.builtin.uri:
        url: "{{ netbox_api_url }}/api/status/"
        method: GET
        headers:
          Authorization: "Token {{ netbox_token }}"
          Accept: "application/json"
        validate_certs: "{{ netbox_validate_certs }}"
        return_content: true
        status_code: 200
      register: netbox_status
      no_log: true

    - name: Show NetBox read-only result
      ansible.builtin.debug:
        msg: "NetBox API read-only test OK. NetBox is reachable and token authentication works."
